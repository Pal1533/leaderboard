<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket Goal.io Ranked Leaderboards</title>

<style>
*{font-weight:bold;box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial,sans-serif;
  color:white;
  padding:20px;
}

.bg{
  position:fixed;
  inset:0;
  background:url("https://i.imgur.com/xQlQsi4.png") center/cover no-repeat;
  filter:blur(5.5px) brightness(0.9);
  z-index:-1;
}

.login-box{
  position:fixed;
  top:10px;
  right:10px;
  display:flex;
  gap:6px;
  z-index:999;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  color:white;
  cursor:pointer;
}

button:hover{background:#0ea5e9;}

.board{display:none;}
.board.active{display:block;}

.table{width:100%;border-collapse:collapse;}
.table td,.table th{padding:10px;background:#111;text-align:center;}
.table tr:nth-child(even) td{background:#151515;}

.admin-box{display:none;position:fixed;right:20px;top:80px;background:#000;padding:15px;border-radius:10px;}
</style>
</head>

<body>

<div class="bg"></div>

<div class="login-box">
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="adminBox" class="admin-box">
  <h3>Admin</h3>
  <input id="playerName" placeholder="Name">
  <input id="playerMMR" type="number" placeholder="MMR">
  <button onclick="addPlayer()">Add</button>
</div>

<h1>Leaderboard</h1>

<div class="board active">
  <table class="table">
    <thead>
      <tr><th>Rank</th><th>Name</th><th>MMR</th><th>Actions</th></tr>
    </thead>
    <tbody id="board"></tbody>
  </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD29s2Jku_DZ42keIQAETgKg7HWt__QEwY",
  authDomain: "rgleaderboard.firebaseapp.com",
  projectId: "rgleaderboard",
  storageBucket: "rgleaderboard.appspot.com",
  messagingSenderId: "247848634543",
  appId: "1:247848634543:web:6a7e506d60544d46cc6c5a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const leaderboardRef = collection(db,"leaderboard");

let admin = false;

const adminEmails = ["underflagfg@gmail.com"];

window.login = async () => {
  await signInWithPopup(auth, provider);
};

window.logout = async () => {
  await signOut(auth);
};

onAuthStateChanged(auth,(user)=>{
  if(user && adminEmails.includes(user.email)){
    admin = true;
    document.getElementById("adminBox").style.display = "block";
  } else {
    admin = false;
    document.getElementById("adminBox").style.display = "none";
  }
});

window.addPlayer = async () => {
  if(!admin) return;

  const name = document.getElementById("playerName").value;
  const mmr = Number(document.getElementById("playerMMR").value);

  if(!name) return;

  await addDoc(leaderboardRef,{
    name,
    mmr
  });
};

window.deletePlayer = async (id) => {
  if(!admin) return;
  await deleteDoc(doc(db,"leaderboard",id));
};

onSnapshot(leaderboardRef,(snap)=>{
  const board = document.getElementById("board");
  board.innerHTML = "";

  const players = [];

  snap.forEach(d=>{
    players.push({id:d.id,...d.data()});
  });

  players.sort((a,b)=>(b.mmr||0)-(a.mmr||0));

  players.forEach((p,i)=>{
    board.innerHTML += `
      <tr>
        <td>#${i+1}</td>
        <td>${p.name}</td>
        <td>${p.mmr}</td>
        <td>
          <button onclick="deletePlayer('${p.id}')">X</button>
        </td>
      </tr>
    `;
  });
});
</script>

</body>
</html>
